name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 + x64 are both built on macos-14 (arm64 runner). The
          # x64 target is a cross-compile; macos-13 runners are flaky and
          # routinely hang in queues, so we avoid them.
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: yamanooto-gui-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: yamanooto-gui-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: yamanooto-gui-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: yamanooto-gui-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux GUI deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev

      - name: Cargo build
        working-directory: gui-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          src="gui-rs/target/${{ matrix.target }}/release/yamanooto-gui"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then src="${src}.exe"; fi
          cp "$src" "dist/${{ matrix.artifact }}"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List
        run: ls -la dist/

      - name: Create release with binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }} — Native GUI builder, cross-platform" \
            --generate-notes \
            dist/*
